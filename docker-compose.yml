services:
  barn-backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/punishergui/project-barn-backend:local
    container_name: barn-backend
    restart: unless-stopped
    environment:
      TZ: ${TZ:-America/Chicago}
      SECRET_KEY: ${SECRET_KEY}
      BARN_DB_PATH: ${BARN_DB_PATH:-/data/db.sqlite}
      UPLOAD_DIR: ${UPLOAD_DIR:-/data/media}
      BARN_UPLOAD_DIR: ${BARN_UPLOAD_DIR:-${UPLOAD_DIR:-/data/media}}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-15728640}
    volumes:
      - ./data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:5000/api/health').status == 200 else 1)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.barn-api.rule=Host(`barn.white-house.cc`) && PathPrefix(`/api`)"
      - "traefik.http.routers.barn-api.entrypoints=websecure"
      - "traefik.http.routers.barn-api.tls=true"
      - "traefik.http.routers.barn-api.priority=100"
      - "traefik.http.services.barn-api.loadbalancer.server.port=5000"

  barn-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ghcr.io/punishergui/project-barn-frontend:local
    container_name: barn-frontend
    restart: unless-stopped
    depends_on:
      - barn-backend
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/',r=>{process.exit(r.statusCode<500?0:1)}).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 45s
    environment:
      BACKEND_ORIGIN: http://barn-backend:5000
      NEXT_PUBLIC_API_BASE_URL: /api
      API_BASE_URL: http://barn-backend:5000/api
      INTERNAL_API_BASE_URL: http://barn-backend:5000/api
      NEXT_PUBLIC_SITE_URL: https://barn.white-house.cc
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.barn.rule=Host(`barn.white-house.cc`)"
      - "traefik.http.routers.barn.entrypoints=websecure"
      - "traefik.http.routers.barn.tls=true"
      - "traefik.http.routers.barn.priority=10"
      - "traefik.http.services.barn.loadbalancer.server.port=3000"

networks:
  proxy:
    external: true
    name: proxy