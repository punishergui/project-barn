{% extends "base.html" %}
{% block title %}Add Auction Sale · {{ project.name }}{% endblock %}
{% block content %}
<section class="form-page">
  <form method="post" class="form-card">
    <label class="field"><span>Sale Date</span><input type="date" name="sale_date"></label>
    <label class="field"><span>Buyer Name</span><input type="text" name="buyer_name" required></label>
    <label class="field"><span>Buyer Business</span><input type="text" name="buyer_business"></label>
    <label class="field">
      <span>Show (optional)</span>
      <select name="show_id">
        <option value="">Select show...</option>
        {% for show in shows %}
        <option value="{{ show.id }}">{{ show.name }}</option>
        {% endfor %}
      </select>
    </label>
    <label class="field"><span>Weight at Sale (lbs)</span><input type="number" step="0.1" name="weight_at_sale"></label>
    <label class="field"><span>Price per lb ($)</span><input type="number" step="0.01" name="price_per_lb"></label>
    <label class="field"><span>Flat Price ($)</span><input type="number" step="0.01" name="flat_price"></label>
    <label class="field"><span>Total Price ($)</span><input type="number" step="0.01" name="total_price"></label>
    <label class="field"><span>Add-ons ($)</span><input type="number" step="0.01" name="addon_amount" value="0"></label>
    <label class="field"><span>Deductions ($)</span><input type="number" step="0.01" name="deductions" value="0"></label>
    <label class="field"><span>Notes</span><textarea name="notes"></textarea></label>
    <button class="submit-btn" type="submit">Save Sale</button>
  </form>
</section>
{% endblock %}
