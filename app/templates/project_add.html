{% extends "base.html" %}
{% block title %}New Project · Project Barn{% endblock %}
{% block content %}
<section class="form-page">
  <form method="post" class="stack-form">
    {% if error %}<p class="form-error">{{ error }}</p>{% endif %}
    <label class="field"><span>Name</span><input name="name" type="text" required></label>
    <label class="field"><span>Type</span>
      <select name="type">
        {% for value in ['cow','pig','goat','sheep','chicken','rabbit','baking','welding','other'] %}
        <option value="{{ value }}">{{ value|capitalize }}</option>
        {% endfor %}
      </select>
    </label>
    <label class="field"><span>Owner</span>
      <select name="owner_id">
        {% for profile in profiles %}
        <option value="{{ profile.id }}">{{ profile.name }}</option>
        {% endfor %}
      </select>
    </label>
    <label class="field"><span>Breed</span><input name="breed" type="text"></label>
    <label class="field"><span>Purchase Price</span><input name="purchase_price" type="number" step="0.01" value="0"></label>
    <label class="field"><span>Notes</span><textarea name="notes" rows="4"></textarea></label>
    <button class="submit-btn" type="submit">Create Project</button>
  </form>
</section>
{% endblock %}
