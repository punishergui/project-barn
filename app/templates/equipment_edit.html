{% extends "base.html" %}
{% block title %}Edit Equipment · Project Barn{% endblock %}
{% block content %}
<section class="form-page">
  <form method="post" class="stack-form">
    <label class="field"><span>Name</span><input name="name" value="{{ item.name }}" required></label>
    <label class="field"><span>Category</span><select name="category">{% for key,label in categories.items() %}<option value="{{ key }}" {% if item.category==key %}selected{% endif %}>{{ label }}</option>{% endfor %}</select></label>
    <label class="field"><span>Description</span><textarea name="description">{{ item.description or '' }}</textarea></label>
    <label class="field"><span>Purchase Date</span><input type="date" name="purchase_date" value="{{ item.purchase_date.isoformat() if item.purchase_date else '' }}"></label>
    <label class="field"><span>Purchase Price</span><input type="number" step="0.01" name="purchase_price" value="{{ item.purchase_price or '' }}"></label>
    <label class="field"><span>Useful Life Years</span><input type="number" name="useful_life_years" value="{{ item.useful_life_years or 5 }}"></label>
    <label class="field"><span>Vendor</span><input name="vendor" value="{{ item.vendor or '' }}"></label>
    <label class="field"><span>Notes</span><textarea name="notes">{{ item.notes or '' }}</textarea></label>
    <button class="submit-btn" type="submit">Save</button>
  </form>
</section>
{% endblock %}
