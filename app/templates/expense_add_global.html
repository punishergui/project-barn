{% extends "base.html" %}
{% block title %}Add Expense · Project Barn{% endblock %}
{% block content %}
<section class="form-page">
  <form method="post" class="stack-form">
    {% if error %}<p class="form-error">{{ error }}</p>{% endif %}
    <label class="field"><span>Project</span>
      <select name="project_id" required>
        <option value="">Select a project</option>
        {% for project in projects %}
        <option value="{{ project.id }}">{{ project.name }} · {{ profiles[project.owner_id].name }}</option>
        {% endfor %}
      </select>
    </label>
    <label class="field"><span>Amount</span><input name="amount" type="number" required step="0.01"></label>
    <label class="field"><span>Category</span>
      <select name="category">
        {% for value, label in expense_categories.items() %}
        <option value="{{ value }}">{{ label }}</option>
        {% endfor %}
      </select>
    </label>
    <label class="field"><span>Date</span><input name="date" type="date" value="{{ today }}"></label>
    <label class="field"><span>Notes</span><input name="notes" type="text"></label>
    <button class="submit-btn" type="submit">Save Expense</button>
  </form>
</section>
{% endblock %}
