{% extends "base.html" %}
{% block title %}Edit Project · Project Barn{% endblock %}
{% block content %}
<section class="form-page">
  <form method="post" class="stack-form">
    <label class="field"><span>Name</span><input name="name" type="text" value="{{ project.name }}" required></label>
    <label class="field"><span>Type</span>
      <select name="type">{% for value in ['cow','pig','goat','sheep','chicken','rabbit','baking','welding','other'] %}<option value="{{ value }}" {% if project.type==value %}selected{% endif %}>{{ value|capitalize }}</option>{% endfor %}</select>
    </label>
    <label class="field"><span>Owner</span><select name="owner_id">{% for profile in profiles %}<option value="{{ profile.id }}" {% if project.owner_id==profile.id %}selected{% endif %}>{{ profile.name }}</option>{% endfor %}</select></label>
    <label class="field"><span>Breed</span><input name="breed" type="text" value="{{ project.breed or '' }}"></label>
    <label class="field"><span>Start Date</span><input name="start_date" type="date" value="{{ project.start_date.isoformat() if project.start_date else '' }}"></label>
    <label class="field"><span>Purchase Date</span><input name="purchase_date" type="date" value="{{ project.purchase_date.isoformat() if project.purchase_date else '' }}"></label>
    <label class="field"><span>Purchase Price</span><input name="purchase_price" type="number" step="0.01" value="{{ project.purchase_price or 0 }}"></label>
    <label class="field"><span>Notes</span><textarea name="notes" rows="4">{{ project.notes or '' }}</textarea></label>
    <button class="submit-btn" type="submit">Save Project</button>
  </form>
</section>
{% endblock %}
