{% extends "base.html" %}
{% block title %}Add Packing List · Project Barn{% endblock %}
{% block content %}
<section class="form-page">
  <form method="post" class="stack-form">
    <label class="field"><span>Name</span><input name="name" required></label>
    <label class="field"><span>Description</span><textarea name="description"></textarea></label>
    <label class="field"><span>Project Type</span><input name="project_type" placeholder="pig, goat, etc"></label>
    <label class="field"><span>Items (comma or newline separated)</span><textarea name="items" rows="8"></textarea></label>
    <button class="submit-btn" type="submit">Create Template</button>
  </form>
</section>
{% endblock %}
